site_name: Nazir's eMahad Notes
site_description: Page-by-page Aalim-course notes (Nahw + Sarf) built from PDF source-of-truth.
site_url: https://nazirhasan92.github.io/eMahad-aalimiyath/
repo_url: https://github.com/NazirHasan92/eMahad-aalimiyath
repo_name: NazirHasan92/eMahad-aalimiyath
edit_uri: edit/main/Nazir/

docs_dir: Nazir
site_dir: site

theme:
  name: material
  language: en
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - toc.follow
    - toc.integrate
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.action.edit
    - content.tooltips
    - announce.dismiss
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: green
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: green
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  font: false
  icon:
    repo: fontawesome/brands/github
    logo: material/book-open-page-variant-outline

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - https://cdn.jsdelivr.net/npm/markmap-autoloader@0.18

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/NazirHasan92/eMahad-aalimiyath

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      permalink_title: Anchor link to this section
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

plugins:
  - search:
      lang:
        - en

hooks:
  - hooks.py

exclude_docs: |
  CLAUDE.md
  progress.md
  daily-drill.md
  session-start.md
  Nahw/BUILD-PROMPT.md
  Nahw/LEARN-PROMPT.md
  Nahw/notes.md
  Arabic/
  Fiqh/
  _memory/
  _handoff/
  _research/
  _planning/
  _archive/
  _validation-reports/
  _chart-lab/
  .claude/
  Nahw/_planning/
  Nahw/_archive/
  Sarf/_planning/
  Sarf/_archive/
  Sarf/_validation-reports/
  Sarf/.pages/
  Nahw/.pages/
  *.pdf
  *.ps1
  *.png

nav:
  - Home: index.md
  - Nahw (نحو):
      - "Kalimah — Ism · Fi'l · Harf": Nahw/01-kalimah.md
      - "Kalimah wa Kalām — Fi'l · Harf · Murakkab": Nahw/p07-fil-harf-murakkab.md
      - "Jumla Khabariyya — Ismiyya · Fi'liyya": Nahw/p08-jumla-khabariyya.md
      - "Jumla Inshā'iyya": Nahw/p09-jumla-inshaiyya.md
      - "Murakkab Ghayr Mufīd": Nahw/p10-murakkab-ghayr-mufid.md
      - "Murakkab Manʿ-e Sarf": Nahw/p11-murakkab-mane-sarf.md
      - "Jumla — Aqsām": Nahw/12-jumla-aqsaam.md
      - "Jumla Sifātī — Aqsām": Nahw/p13-jumla-sifati-aqsaam.md
      - "ʿAlāmāt-e Ism": Nahw/p14-alamat-ism.md
      - "ʿAlāmāt-e Fiʿl · Harf": Nahw/p15-alamat-fil-harf.md
      - "Muʿrab · Mabnī": Nahw/p16-muarab-mabni.md
      - "Mabnī · Muʿrab — Aqsām": Nahw/p17-mabni-murab-aqsaam.md
      - "Ism Ghayr Mutamakkin — Aqsām": Nahw/p18-ism-ghayr-mutamakkin-aqsam.md
      - "Zamīr Mansūb · Majrūr": Nahw/p19-zameer-mansoob-majroor.md
      - "Asmā-e Mawsūla": Nahw/p20-asma-mawsoola.md
      - "Asmā-e Ishāra": Nahw/p21-asma-e-ishara.md
  - Sarf (صرف):
      - "Istilāhāt — ʿIlm-e Sarf": Sarf/p18-istilahaat.md
      - "Wāziʿ · Kalimah": Sarf/p19-waazi-kalima.md
      - "Fiʿl kī Taqsīm": Sarf/p20-fel-ki-taqseem.md
      - "Harf · Hurūf-e Tahajjī": Sarf/p21-harf-huroof-tahajji.md
      - "Hurūf · Harakat": Sarf/p22-huroof-harkat.md
      - "Ism kī Aqsām": Sarf/p23-ism-ki-aqsaam.md
      - "Asmā-e Mushtaqqa": Sarf/p24-asma-mushtaqqa.md
      - "Wazn Nikālne kā Tarīqa": Sarf/p25-wazn-nikalne-ka-tariqa.md
      - "Hurūf Asliyya · Asmā Awzān": Sarf/p26-huroof-asliya-asma-awzaan.md
      - "Afʿāl ke Awzān": Sarf/p27-afaal-ke-awzaan.md
      - "Chha Abwāb": Sarf/p28-chha-abwaab.md
      - "Abwāb — Groups · ʿAlāmāt": Sarf/p29-abwaab-groups-alamaat.md
      - "Shash Aqsām": Sarf/p30-shash-aqsaam.md
      - "Fiʿl kī Aqsām — Thulāthī · Rubāʿī": Sarf/p31-fel-ki-aqsaam-thulathi-rubai.md
      - "Haft Aqsām — Mizāj-e Hurūf": Sarf/p32-haft-aqsaam-mizaj-huroof.md
