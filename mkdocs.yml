site_name: Nazir's eMahad Notes
site_description: Page-by-page Aalim-course notes (Nahw + Sarf) built from PDF source-of-truth.
site_url: https://nazirhasan92.github.io/eMahad-aalimiyath/
repo_url: https://github.com/NazirHasan92/eMahad-aalimiyath
repo_name: NazirHasan92/eMahad-aalimiyath
edit_uri: edit/main/Nazir/

docs_dir: Nazir
site_dir: site

theme:
  name: material
  language: en
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - toc.follow
    - toc.integrate
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.action.edit
    - content.tooltips
    - announce.dismiss
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: green
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: green
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  font: false
  icon:
    repo: fontawesome/brands/github
    logo: material/book-open-page-variant-outline

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - https://cdn.jsdelivr.net/npm/markmap-autoloader@0.18

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/NazirHasan92/eMahad-aalimiyath

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      permalink_title: Anchor link to this section
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

plugins:
  - search:
      lang:
        - en

hooks:
  - hooks.py

exclude_docs: |
  CLAUDE.md
  progress.md
  daily-drill.md
  session-start.md
  Nahw/BUILD-PROMPT.md
  Nahw/LEARN-PROMPT.md
  Nahw/notes.md
  Arabic/
  Fiqh/
  _memory/
  _handoff/
  _research/
  _planning/
  _archive/
  _validation-reports/
  _chart-lab/
  .claude/
  Nahw/_planning/
  Nahw/_archive/
  Sarf/_planning/
  Sarf/_archive/
  Sarf/_validation-reports/
  Sarf/.pages/
  Nahw/.pages/
  *.pdf
  *.ps1
  *.png

